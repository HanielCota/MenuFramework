name-template: 'MenuFramework $RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'deps'
change-template: '- $TITLE by @$AUTHOR in #$NUMBER'
template: |
  ## What's Changed

  $CHANGES

  ## Installation

  ```groovy
  repositories {
      maven { url = 'https://jitpack.io' }
  }

  dependencies {
      implementation 'com.github.HanielCota:MenuFramework:v$RESOLVED_VERSION'
  }
  ```

  ## Release Assets

  - `MenuFramework-$RESOLVED_VERSION.jar`: shadowed production artifact.
  - `MenuFramework-$RESOLVED_VERSION-sources.jar`: source jar for IDE navigation.
  - `llms.txt`: canonical AI usage guide for MenuFramework.

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'deps'
      - 'docs'
  default: patch
