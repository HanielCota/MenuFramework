changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - "type: enhancement"
        - enhancement
    - title: Fixes
      labels:
        - "type: bug"
        - bug
    - title: Documentation
      labels:
        - "type: documentation"
        - documentation
    - title: Maintenance
      labels:
        - chore
        - dependencies
    - title: Other Changes
      labels:
        - "*"

