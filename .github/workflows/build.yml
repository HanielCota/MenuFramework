name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Runs the full suite (JaCoCo report is finalizedBy `test`) and the shaded build on both the
      # Linux servers run on and the Windows dev environment. `./gradlew` works on both via bash.
      - name: Validate
        run: ./gradlew clean test build

  docs:
    name: Validate docs YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install validators
        run: pip install jsonschema pyyaml

      # Validates the YAML examples in AGENTS.md/README.md and the shipped menus against
      # docs/menu.schema.json, so the docs and the schema can never drift apart.
      - name: Validate menu YAML against the schema
        run: python scripts/validate_docs_yaml.py
