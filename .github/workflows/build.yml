name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Runs the full suite (JaCoCo report is finalizedBy `test`) and the shaded build on both the
      # Linux servers run on and the Windows dev environment. `./gradlew` works on both via bash.
      - name: Validate
        run: ./gradlew clean test build
