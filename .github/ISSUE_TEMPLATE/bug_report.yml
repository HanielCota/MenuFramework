name: Bug report
description: Report a problem with MenuFramework
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal menu class and YAML, plus the actions that trigger the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MenuFramework version
      placeholder: "v0.1.0 or main-SNAPSHOT"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Server platform and version
      placeholder: "Paper 1.21.x / Folia 1.21.x"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Console output or stack traces. Paste as text, not screenshots.
      render: text
    validations:
      required: false
