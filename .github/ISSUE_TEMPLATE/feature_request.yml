name: Feature request
description: Suggest a framework capability or API improvement.
title: "[Feature]: "
labels:
  - "type: enhancement"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any workaround or alternate API shape?
